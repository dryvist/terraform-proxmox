default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Terraform static checks - run on every commit via direnv-provided tools
  # (Nix shell at .envrc supplies terraform, tflint, terraform-docs).
  # Same checks run in CI via .github/workflows/ci-gate.yml as a safety net.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=docs/TERRAFORM_REFERENCE.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
      - id: terraform_tflint
        args:
          # Fail the hook on errors; surface (do not block on) warnings such as
          # the repo's deliberate variables-*.tf split (terraform_standard_module_structure).
          - --args=--minimum-failure-severity=error
          - --args=--only=terraform_deprecated_interpolation
          - --args=--only=terraform_deprecated_index
          - --args=--only=terraform_unused_declarations
          - --args=--only=terraform_comment_syntax
          - --args=--only=terraform_documented_outputs
          - --args=--only=terraform_documented_variables
          - --args=--only=terraform_typed_variables
          - --args=--only=terraform_module_pinned_source
          - --args=--only=terraform_naming_convention
          - --args=--only=terraform_required_version
          - --args=--only=terraform_required_providers
          - --args=--only=terraform_standard_module_structure

  # Checkov - Terraform IaC security scanner
  - repo: https://github.com/bridgecrewio/checkov.git
    rev: 3.2.526
    hooks:
      - id: checkov
        args: ['-d', '.', '--framework', 'terraform', '--quiet']
        pass_filenames: false

  # Secret scanning — official gitleaks hook, driven by the committed
  # value-free .gitleaks.toml. The same scan runs in CI (ci-gate.yml).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Local hooks using nix+doppler toolchain
  - repo: local
    hooks:
      - id: tofu-test
        name: tofu test (mock providers)
        entry: direnv exec . bash -c 'tofu init -backend=false -no-color && tofu test -no-color'
        language: system
        files: '\.(tf|hcl)$'
        pass_filenames: false
