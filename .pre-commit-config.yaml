default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Terraform hooks - require terraform/tflint installed locally
  # These run in CI via GitHub Actions instead
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
        stages: [manual]  # Run manually or in CI, not on every commit
      - id: terraform_validate
        stages: [manual]
      - id: terraform_docs
        stages: [manual]
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
      - id: terraform_tflint
        stages: [manual]
        args:
          - --args=--only=terraform_deprecated_interpolation
          - --args=--only=terraform_deprecated_index
          - --args=--only=terraform_unused_declarations
          - --args=--only=terraform_comment_syntax
          - --args=--only=terraform_documented_outputs
          - --args=--only=terraform_documented_variables
          - --args=--only=terraform_typed_variables
          - --args=--only=terraform_module_pinned_source
          - --args=--only=terraform_naming_convention
          - --args=--only=terraform_required_version
          - --args=--only=terraform_required_providers
          - --args=--only=terraform_standard_module_structure

  # Checkov - Terraform IaC security scanner
  - repo: https://github.com/bridgecrewio/checkov.git
    rev: 3.2.526
    hooks:
      - id: checkov
        args: ['-d', '.', '--framework', 'terraform', '--quiet']
        pass_filenames: false

  # Local hooks using nix+doppler toolchain
  - repo: local
    hooks:
      - id: tofu-test
        name: tofu test (mock providers)
        entry: bash -c 'tofu init -backend=false -no-color >/dev/null 2>&1 && tofu test -no-color'
        language: system
        files: '\.(tf|hcl)$'
        pass_filenames: false
