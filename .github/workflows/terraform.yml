name: Terraform CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: OpenTofu Format
        id: fmt
        run: tofu fmt -check

      - name: OpenTofu Init
        id: init
        run: tofu init -backend=false

      - name: OpenTofu Validate
        id: validate
        run: tofu validate -no-color

      - name: OpenTofu Test
        id: test
        run: tofu test -no-color

      # tofu test does not recurse into modules/*/tests — gate module suites
      # explicitly so they can never silently rot again (#580).
      - name: OpenTofu Init (firewall module)
        id: init_firewall
        run: tofu init -backend=false
        working-directory: modules/firewall

      - name: OpenTofu Test (firewall module)
        id: test_firewall
        run: tofu test -no-color
        working-directory: modules/firewall

