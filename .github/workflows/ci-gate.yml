# CI Gate — local Merge Gate over the org reusable gate + repo-local jobs.
#
# The standard doc checks (Markdown Lint, File Size) and their aggregation are
# delegated to dryvist/.github/.github/workflows/_ci-gate.yml@main. The OpenTofu
# suite (fmt/init/validate/test for the root, proxmox-stack, and firewall
# modules) and the gitleaks secret scan stay repo-local — the shared gate cannot
# dispatch a consumer-local job — and this workflow's own "Merge Gate"
# re-aggregates the shared gate's result plus those local jobs. Branch
# protection requires exactly "Merge Gate".
#
# A repo-local `changes` job is still needed: the shared gate exposes no
# workflow_call outputs, so the local `terraform` job needs its own path
# trigger. Markdown/file-size change detection lives inside the shared gate.
#
# dependency_review and zizmor are left off to keep this migration purely
# structural (this repo has never run them); enabling them is a fast-follow.

name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ==========================================================================
  # CHANGE DETECTION (repo-local — drives the local terraform job only)
  # ==========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            terraform:
              - '**.tf'
              - '**.tfvars'
              - '.terraform.lock.hcl'
              - 'tests/**'

  # ==========================================================================
  # SHARED GATE — Markdown Lint + File Size via the org reusable gate.
  # The shared gate's File Size job keys off the `nix`/`markdown` filter
  # outputs, so the OpenTofu source globs are supplied under the `nix` key to
  # preserve "file-size runs when terraform OR markdown changed". `nix_validate`
  # stays off, so that key only drives file-size here.
  # ==========================================================================
  shared-gate:
    permissions:
      contents: read
      pull-requests: read
      # The org gate's queue watchdog cancels stuck sibling jobs via the
      # Actions API; a called workflow can never exceed the caller's grant, so
      # actions: write must be granted here or the run fails at graph
      # validation (startup_failure).
      actions: write
    uses: dryvist/.github/.github/workflows/_ci-gate.yml@main
    with:
      markdown_lint: true
      file_size: true
      dependency_review: false
      zizmor: false
      filters: |
        nix:
          - '**.tf'
          - '**.tfvars'
          - '.terraform.lock.hcl'
          - 'tests/**'
        markdown:
          - '**.md'
          - '.markdownlint*'

  # ==========================================================================
  # CONDITIONAL CHECKS (repo-local)
  # ==========================================================================
  terraform:
    name: Terraform
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2
      - name: OpenTofu Format
        run: tofu fmt -check
      - name: OpenTofu Init
        run: tofu init -backend=false
      - name: OpenTofu Validate
        run: tofu validate -no-color
      - name: OpenTofu Test
        run: tofu test -no-color
      - name: OpenTofu Init (Proxmox stack module)
        run: tofu init -backend=false
        working-directory: modules/proxmox-stack
      - name: OpenTofu Test (Proxmox stack module)
        run: tofu test -no-color
        working-directory: modules/proxmox-stack
      # tofu test does not recurse into modules/*/tests — gate module suites
      # explicitly so they can never silently rot again (#580).
      - name: OpenTofu Init (firewall module)
        run: tofu init -backend=false
        working-directory: modules/firewall
      - name: OpenTofu Test (firewall module)
        run: tofu test -no-color
        working-directory: modules/firewall

  # Secrets can appear in ANY file, so this runs on every PR (no path filter,
  # never skipped). Official gitleaks-action; org GITLEAKS_LICENSE is seeded.
  # Auto-detects the committed value-free .gitleaks.toml at the repo root.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE_KEY }}

  # ==========================================================================
  # MERGE GATE - The ONLY required check in branch protection
  # ==========================================================================
  gate:
    name: Merge Gate
    needs: [changes, shared-gate, terraform, secret-scan]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check all results
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: terraform
          jobs: ${{ toJSON(needs) }}
