name: Post-Merge Test Review

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to review'
        required: false
        type: string
  # --- DISABLED AUTOMATIC TRIGGERS (restore by uncommenting) ---
